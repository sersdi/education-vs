<!DOCTYPE html>                         <!-- Структура веб страницы --> 
<html lang="en">                        <!-- Главный тэг сайта -->
<head>                                  <!-- Голова в ней вся тех инфа -->
    <meta charset="UTF-8">              <!-- тег отвечает за кодировку символов на странице --> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">         <!-- тег отвечает за работу на телефоне -->
    <title>CSS селекторы</title>                                                   <!-- Это название сайта(ключевые слова),который отображается в интернете --> 
    <meta name="description" content="Здесь вы изучите все необходимые в работе CSS селекторы" >    <!-- Тэг meta description описание сайта под его названием в интернете Это поле описания создаём сами,скобка закрывается обычной треугольной -->
    <style>                                                     /* CSS тег стайл находится в голове тк сайт читает сверху вниз */ 
        h1{color: darkmagenta;}
    </style>



</head>

<body>                            <!--  В теле наша разметка страницы -->
    <h1>Hello world!</h1>



</body>

</html>
