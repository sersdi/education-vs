<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<!--<ul>-Обертка для списка, нумеруется визуально -->
		<!-- Eй можно задавать стиль нумерации и элементам списка -->
		<ul type="square">
			<li>Это элемент списка ul</li>
            <li type="I">Это элемент списка ul</li>
		</ul>
		<!--<ol>-Обертка для списка, нумеруется цифирно -->
		<ol type="I">
			<li type="A">Это элемент списка ol</li>
            <li>Это второй элемент списка ol</li>
		</ol>
	</body>
</html>
