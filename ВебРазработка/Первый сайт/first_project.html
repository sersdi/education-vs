<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>                          /* Что бы изменить внешний вид используем язык CSS: тег style Выбираем по тегам елементы и что хотим в них изменить */                                  
        p{                                              
            color:blue;
             font-size:25px;                
        }
        h1{
            color:blue;
        }
        h2{
            color:blue;
        }
    </style>
</head>
<body>
    <p>Hello world!!!</p>                               <!--    <p>(параграф) Это тег,из них состоит язык html(язык гипертекстовой разметки)    --> 
        <h1>Это заголовок первого уровня</h1>               <!--    <h1>(главный заголовок) должен быть обяз на странице      -->       
        <h2>Это заголовок второго уровня</h2>
    
</body>
</html>
