<!DOCTYPE html>
<html lang="en">                                <!-- тело самого сайта главный тэг -->
<head>                                          <!-- голова -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div tags</title>
    <link rel="stylesheet" href="style.css"> <!-- Что бы сайт видел стили нужно их подключить с документа Style CSS Используем link(тэг) rel="stylesheet" href="название документа" -->

<!-- rel-это атрибут HTML, описывающий ссылку Он обозначает, что это за ссылка и на какой адрес она ведет.-->
<!-- href-указывает браузеру URL-адрес страницы, куда ведет ссылка.--> 
<!-- Убрали из головы тэг стайл и перенесли его CSS элементы в отдельный документ CSS(редактирование объектов)-->     
</head>
<body>
    <div class="box-1" >                                    <!-- Тэг div контейнер(обёртка) для работы с контентом(самый популярный тег в HTML) -->
        <p class="text-1">"Это первый контейнер</p>        <!-- тэг p параграф -->
    </div>

    <div class="box-2">                                  <!-- class нужен что бы унифицировать тэги для их кастомизации по отдельности(в кавычках придумываем название класса) -->
        <p class="text-2">Это второй контейнер</p>
    </div>

</body>
</html>
